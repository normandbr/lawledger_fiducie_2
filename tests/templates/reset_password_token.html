<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LawLedger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-brand">⚖ LawLedger</h1>
                <p class="auth-subtitle">Legal Matter Management System</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <h2 class="auth-title">Set New Password</h2>
            <p class="auth-description">Enter and confirm your new password below.</p>

            <form method="POST">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" required autofocus
                           placeholder="Enter new password"
                           style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;font-family:inherit;">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Repeat new password"
                           style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;font-family:inherit;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('login') }}">&larr; Back to Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
